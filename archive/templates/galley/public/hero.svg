<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none" role="img" aria-label="Base documentation hero">
  <!-- Clean neutral dark background -->
  <rect width="800" height="360" rx="10" fill="#0d0d0d"/>
  <!-- Subtle dot grid pattern -->
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#222222"/>
    </pattern>
  </defs>
  <rect width="800" height="360" fill="url(#dots)"/>

  <!-- Left: stacked-square composition (brand mark, large) -->
  <rect x="60"  y="160" width="80" height="60" rx="6" fill="#1a1a1a" stroke="#c24e3d" stroke-width="1.5"/>
  <rect x="80"  y="140" width="80" height="60" rx="6" fill="#141414" stroke="#333333" stroke-width="1"/>
  <rect x="100" y="120" width="80" height="60" rx="6" fill="#111111" stroke="#222222" stroke-width="1"/>
  <!-- Blue accent square on top layer -->
  <rect x="108" y="128" width="20" height="20" rx="3" fill="#c24e3d" opacity="0.9"/>
  <rect x="134" y="128" width="36" height="6"  rx="2" fill="#333333"/>
  <rect x="134" y="140" width="26" height="6"  rx="2" fill="#2a2a2a"/>
  <rect x="108" y="155" width="62" height="6"  rx="2" fill="#2a2a2a"/>

  <!-- Right: docs/browser window mock -->
  <rect x="440" y="55" width="310" height="230" rx="8" fill="#141414" stroke="#222222" stroke-width="1"/>
  <!-- Window top bar -->
  <rect x="440" y="55" width="310" height="36" rx="8" fill="#1a1a1a"/>
  <rect x="440" y="79" width="310" height="12" fill="#1a1a1a"/>
  <!-- Address-bar pill -->
  <rect x="510" y="66" width="170" height="14" rx="7" fill="#222222"/>
  <!-- Back / fwd dots (nav circles) -->
  <circle cx="460" cy="73" r="5" fill="#2a2a2a"/>
  <circle cx="474" cy="73" r="5" fill="#2a2a2a"/>
  <!-- Sidebar strip -->
  <rect x="440" y="91" width="80" height="194" rx="0" fill="#111111"/>
  <rect x="440" y="91" width="80" height="194" rx="0" fill="#111111"/>
  <!-- Sidebar links -->
  <rect x="452" y="104" width="52" height="6" rx="3" fill="#333333"/>
  <rect x="452" y="118" width="44" height="6" rx="3" fill="#c24e3d" opacity="0.7"/>
  <rect x="452" y="132" width="48" height="6" rx="3" fill="#2a2a2a"/>
  <rect x="452" y="146" width="40" height="6" rx="3" fill="#2a2a2a"/>
  <rect x="452" y="160" width="50" height="6" rx="3" fill="#2a2a2a"/>
  <rect x="452" y="182" width="52" height="6" rx="3" fill="#333333"/>
  <rect x="452" y="196" width="44" height="6" rx="3" fill="#2a2a2a"/>
  <rect x="452" y="210" width="48" height="6" rx="3" fill="#2a2a2a"/>
  <rect x="452" y="224" width="36" height="6" rx="3" fill="#2a2a2a"/>
  <!-- Active sidebar indicator -->
  <rect x="440" y="115" width="3" height="14" rx="1.5" fill="#c24e3d"/>
  <!-- Content area lines -->
  <rect x="534" y="104" width="120" height="10" rx="3" fill="#222222"/>
  <rect x="534" y="122" width="200" height="6"  rx="2" fill="#1e1e1e"/>
  <rect x="534" y="136" width="180" height="6"  rx="2" fill="#1e1e1e"/>
  <rect x="534" y="150" width="195" height="6"  rx="2" fill="#1e1e1e"/>
  <!-- Code block mock -->
  <rect x="534" y="170" width="200" height="52" rx="4" fill="#111111" stroke="#222222" stroke-width="1"/>
  <rect x="542" y="179" width="70"  height="5"  rx="2" fill="#c24e3d" opacity="0.5"/>
  <rect x="542" y="192" width="110" height="5"  rx="2" fill="#2a2a2a"/>
  <rect x="542" y="205" width="90"  height="5"  rx="2" fill="#2a2a2a"/>
  <rect x="542" y="218" width="55"  height="5"  rx="2" fill="#d6796b" opacity="0.35"/>

  <!-- Bottom left: subtle text placeholder lines -->
  <rect x="60" y="242" width="280" height="8" rx="3" fill="#1e1e1e"/>
  <rect x="60" y="258" width="240" height="6" rx="2" fill="#1a1a1a"/>
  <rect x="60" y="272" width="200" height="6" rx="2" fill="#1a1a1a"/>

  <!-- Blue accent bottom rule -->
  <rect x="60" y="300" width="40" height="3" rx="1.5" fill="#c24e3d"/>
  <rect x="108" y="300" width="20" height="3" rx="1.5" fill="#c24e3d" opacity="0.35"/>
</svg>
