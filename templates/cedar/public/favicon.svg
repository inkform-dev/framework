<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Cedar favicon">
  <!-- Warm near-black background -->
  <rect width="32" height="32" rx="8" fill="#17120e"/>
  <!-- Maple leaf mark centred on the tile -->
  <g transform="translate(16, 16)">
    <!-- stem -->
    <line x1="0" y1="8" x2="0" y2="3" stroke="#ea580c" stroke-width="1.6" stroke-linecap="round"/>
    <!-- leaf body -->
    <path d="M0 3 C-4 0 -9 -1 -8 -7 C-7 -11 -4 -12 0 -9 C4 -12 7 -11 8 -7 C9 -1 4 0 0 3 Z" fill="#fb923c"/>
    <!-- centre vein -->
    <path d="M0 -9 L0 3" stroke="#fcd9b6" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
