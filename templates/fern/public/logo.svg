<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 32" fill="none" role="img" aria-label="Fern">
  <!-- Fern leaf mark: central stem with fronds -->
  <!-- Leaf body fill -->
  <path d="M14 28 C12 22 8 17 9 11 C10 6 14 4 14 4 C14 4 18 6 19 11 C20 17 16 22 14 28Z" fill="#16a34a" opacity="0.14"/>
  <!-- Central stem -->
  <line x1="14" y1="28" x2="14" y2="5" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left fronds -->
  <path d="M14 22 Q9 19 8 15" stroke="#16a34a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M14 17 Q10 14 9 11" stroke="#16a34a" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M14 13 Q11 10 11 8" stroke="#16a34a" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Right fronds -->
  <path d="M14 20 Q19 17 20 13" stroke="#34d399" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M14 15 Q18 12 18 9" stroke="#34d399" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.55"/>
  <!-- Wordmark -->
  <text x="28" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="-0.02em" fill="currentColor">Fern</text>
</svg>
