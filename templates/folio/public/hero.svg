<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none" role="img" aria-label="Folio documentation hero">
  <!-- Dark background -->
  <rect width="800" height="360" rx="20" fill="#0a1220"/>
  <!-- Concentric rings behind the mark, echoing Willow's layered hero backdrop -->
  <circle cx="400" cy="180" r="170" fill="#0f1f38"/>
  <circle cx="400" cy="180" r="128" fill="#15294a"/>
  <circle cx="400" cy="180" r="88" fill="#1b355c"/>
  <!-- Folio mark, centered: a folded-corner page/leaf -->
  <path d="M340 100H420L468 148V260H340V100Z" fill="#3b82f6"/>
  <path d="M420 100L468 148H420V100Z" fill="#93b8fb"/>
  <path d="M364 190H436M364 216H436" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.92"/>
</svg>
