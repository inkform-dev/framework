<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 32" fill="none" role="img" aria-label="Glyph">
  <!-- Glyph mark: a terminal prompt chevron + cursor block, in a rounded chip -->
  <rect x="2" y="2" width="28" height="28" rx="7" fill="#ea580c"/>
  <path d="M11 10 L19 16 L11 22" stroke="#fffaf4" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="20.5" y="19.5" width="6" height="3" rx="1" fill="#fffaf4"/>
  <!-- Wordmark — fixed brand hex, not currentColor: this file loads via a
       plain <img> tag (components/top-bar.tsx), and currentColor does not
       resolve through <img src="...svg">'s isolated document context (it
       falls back to the SVG's own initial black, not the page's --fw-fg) —
       confirmed directly rather than assumed. A fixed brand color also
       matches how most real wordmarks behave: the logo doesn't invert with
       the site's theme. -->
  <text x="36" y="21" font-family="ui-monospace, 'JetBrains Mono', 'Courier New', monospace" font-size="15" font-weight="700" letter-spacing="0.02em" fill="#ea580c">GLYPH</text>
</svg>
