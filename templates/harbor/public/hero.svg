<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none" role="img" aria-label="Harbor documentation image sample">
  <!-- Dark background -->
  <rect width="800" height="360" rx="12" fill="#0a0f0e"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2725" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="360" fill="url(#grid)"/>
  <!-- Teal glow arcs (ambient only, pointer-events-none equivalent) -->
  <path d="M160 340 Q300 60 440 340" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M200 340 Q340 80 480 340" stroke="#2dd4bf" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.38"/>
  <path d="M240 340 Q380 100 520 340" stroke="#0d9488" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.22"/>
  <path d="M280 340 Q420 120 560 340" stroke="#5eead4" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.14"/>
  <!-- Terminal/docs window mock -->
  <rect x="480" y="60" width="280" height="200" rx="8" fill="#0e1514" stroke="#1c2725" stroke-width="1"/>
  <!-- Window chrome dots -->
  <circle cx="500" cy="78" r="5" fill="#dc2626" opacity="0.6"/>
  <circle cx="516" cy="78" r="5" fill="#d97706" opacity="0.6"/>
  <circle cx="532" cy="78" r="5" fill="#16a34a" opacity="0.6"/>
  <!-- Code lines -->
  <rect x="496" y="98" width="140" height="7" rx="3" fill="#1c2725"/>
  <rect x="496" y="113" width="200" height="7" rx="3" fill="#1c2725"/>
  <rect x="496" y="128" width="100" height="7" rx="3" fill="#14b8a6" opacity="0.4"/>
  <rect x="496" y="143" width="180" height="7" rx="3" fill="#1c2725"/>
  <rect x="496" y="158" width="120" height="7" rx="3" fill="#1c2725"/>
  <rect x="496" y="173" width="160" height="7" rx="3" fill="#2dd4bf" opacity="0.3"/>
  <rect x="496" y="188" width="80" height="7" rx="3" fill="#1c2725"/>
  <rect x="496" y="203" width="200" height="7" rx="3" fill="#1c2725"/>
  <!-- Left text block -->
  <rect x="60" y="120" width="280" height="28" rx="4" fill="#1c2725"/>
  <rect x="60" y="162" width="340" height="14" rx="3" fill="#2a3835"/>
  <rect x="60" y="184" width="300" height="14" rx="3" fill="#2a3835"/>
  <rect x="60" y="206" width="260" height="14" rx="3" fill="#2a3835"/>
  <!-- Teal accent line on left block header -->
  <rect x="60" y="120" width="4" height="28" rx="2" fill="#14b8a6"/>
</svg>
