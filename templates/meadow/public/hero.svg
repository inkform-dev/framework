<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none" role="img" aria-label="Meadow documentation hero">
  <!-- Warm off-white background -->
  <rect width="800" height="360" rx="20" fill="#faf6ee"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="meadow-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#eee3d2" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="360" fill="url(#meadow-grid)"/>
  <!-- Rising sun + orbit rings (ambient only, pointer-events-none equivalent) -->
  <circle cx="230" cy="330" r="90" fill="#d97706"/>
  <circle cx="230" cy="330" r="140" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.4"/>
  <circle cx="230" cy="330" r="180" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.22"/>
  <circle cx="230" cy="330" r="6" fill="#b45309"/>
  <!-- Docs window mock -->
  <rect x="480" y="60" width="280" height="200" rx="10" fill="#ffffff" stroke="#eee3d2" stroke-width="1"/>
  <!-- Window chrome dots -->
  <circle cx="500" cy="78" r="5" fill="#dc2626" opacity="0.5"/>
  <circle cx="516" cy="78" r="5" fill="#d97706" opacity="0.7"/>
  <circle cx="532" cy="78" r="5" fill="#16a34a" opacity="0.5"/>
  <!-- Content lines -->
  <rect x="496" y="98" width="140" height="7" rx="3" fill="#f3ead8"/>
  <rect x="496" y="113" width="200" height="7" rx="3" fill="#f3ead8"/>
  <rect x="496" y="128" width="100" height="7" rx="3" fill="#d97706" opacity="0.45"/>
  <rect x="496" y="143" width="180" height="7" rx="3" fill="#f3ead8"/>
  <rect x="496" y="158" width="120" height="7" rx="3" fill="#f3ead8"/>
  <rect x="496" y="173" width="160" height="7" rx="3" fill="#d97706" opacity="0.3"/>
  <rect x="496" y="188" width="80" height="7" rx="3" fill="#f3ead8"/>
  <rect x="496" y="203" width="200" height="7" rx="3" fill="#f3ead8"/>
  <!-- Left text block -->
  <rect x="60" y="120" width="280" height="28" rx="4" fill="#241c14"/>
  <rect x="60" y="162" width="340" height="14" rx="3" fill="#ddccb1"/>
  <rect x="60" y="184" width="300" height="14" rx="3" fill="#ddccb1"/>
  <rect x="60" y="206" width="260" height="14" rx="3" fill="#ddccb1"/>
  <!-- Amber accent line on left block header -->
  <rect x="60" y="120" width="4" height="28" rx="2" fill="#d97706"/>
</svg>
