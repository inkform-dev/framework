<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none" role="img" aria-label="Mono documentation hero">
  <!-- Near-black terminal background — sharp corners, brutalist -->
  <rect width="800" height="360" fill="#0a0a0a"/>

  <!-- Dot grid — the Mono signature pattern -->
  <defs>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#2a2a2a"/>
    </pattern>
  </defs>
  <rect width="800" height="360" fill="url(#dots)"/>

  <!-- Left panel: terminal prompt block -->
  <!-- Panel border — 1.5px, crisp grey -->
  <rect x="48" y="60" width="340" height="240" fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Panel header bar -->
  <rect x="48" y="60" width="340" height="32" fill="#141414" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Header label dots replaced with text — terminal style -->
  <text x="64" y="81" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#7a7a7a" letter-spacing="0.04em">TERMINAL</text>
  <!-- Red-orange accent top-left corner bar -->
  <rect x="48" y="60" width="3" height="32" fill="#0a0a0a"/>

  <!-- Terminal lines — prompt + commands -->
  <!-- Line 1: prompt -->
  <text x="64" y="115" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#0a0a0a" letter-spacing="0.02em">$</text>
  <rect x="76" y="106" width="180" height="8" fill="#2a2a2a"/>
  <!-- Line 2 -->
  <rect x="64" y="124" width="240" height="7" fill="#1e1e1e"/>
  <!-- Line 3: accent -->
  <rect x="64" y="140" width="140" height="7" fill="#0a0a0a" opacity="0.35"/>
  <!-- Line 4 -->
  <rect x="64" y="157" width="200" height="7" fill="#1e1e1e"/>
  <!-- Line 5 -->
  <rect x="64" y="173" width="160" height="7" fill="#1e1e1e"/>
  <!-- Line 6: prompt -->
  <text x="64" y="197" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" fill="#0a0a0a" letter-spacing="0.02em">$</text>
  <rect x="76" y="188" width="120" height="8" fill="#2a2a2a"/>
  <!-- Line 7 -->
  <rect x="64" y="207" width="200" height="7" fill="#1e1e1e"/>
  <!-- Line 8: accent -->
  <rect x="64" y="223" width="100" height="7" fill="#f5f5f5" opacity="0.25"/>
  <!-- Line 9 -->
  <rect x="64" y="240" width="180" height="7" fill="#1e1e1e"/>
  <!-- Blinking cursor block -->
  <rect x="64" y="270" width="8" height="14" fill="#0a0a0a" opacity="0.9"/>

  <!-- Right panel: API reference mock -->
  <rect x="420" y="60" width="332" height="240" fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Right panel header -->
  <rect x="420" y="60" width="332" height="32" fill="#141414" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="436" y="81" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#7a7a7a" letter-spacing="0.04em">API REFERENCE</text>
  <!-- Red-orange accent bar -->
  <rect x="420" y="60" width="3" height="32" fill="#0a0a0a"/>

  <!-- Method pills — GET, POST, DELETE rows -->
  <!-- Row 1: GET -->
  <rect x="436" y="108" width="34" height="14" fill="#16a34a" opacity="0.15"/>
  <text x="440" y="119" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#34d399" letter-spacing="0.06em">GET</text>
  <rect x="478" y="110" width="180" height="10" fill="#1e1e1e"/>
  <!-- Row 2: POST -->
  <rect x="436" y="132" width="38" height="14" fill="#0a0a0a" opacity="0.15"/>
  <text x="440" y="143" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#0a0a0a" letter-spacing="0.06em">POST</text>
  <rect x="482" y="134" width="140" height="10" fill="#1e1e1e"/>
  <!-- Row 3: GET -->
  <rect x="436" y="156" width="34" height="14" fill="#16a34a" opacity="0.15"/>
  <text x="440" y="167" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#34d399" letter-spacing="0.06em">GET</text>
  <rect x="478" y="158" width="200" height="10" fill="#1e1e1e"/>
  <!-- Row 4: DELETE -->
  <rect x="436" y="180" width="50" height="14" fill="#dc2626" opacity="0.13"/>
  <text x="440" y="191" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#f87171" letter-spacing="0.06em">DELETE</text>
  <rect x="494" y="182" width="120" height="10" fill="#1e1e1e"/>
  <!-- Row 5: PATCH -->
  <rect x="436" y="204" width="44" height="14" fill="#7c3aed" opacity="0.13"/>
  <text x="440" y="215" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" fill="#a78bfa" letter-spacing="0.06em">PATCH</text>
  <rect x="488" y="206" width="160" height="10" fill="#1e1e1e"/>
  <!-- Separator line -->
  <line x1="436" y1="228" x2="736" y2="228" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Response code block -->
  <text x="436" y="248" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" fill="#7a7a7a" letter-spacing="0.04em">200 OK</text>
  <rect x="436" y="256" width="240" height="7" fill="#1e1e1e"/>
  <rect x="436" y="270" width="180" height="7" fill="#0a0a0a" opacity="0.18"/>

  <!-- Connector line between panels -->
  <line x1="388" y1="180" x2="420" y2="180" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Small bolt watermark, bottom right, very subtle -->
  <polygon points="782,328 770,346 776,346 773,356 786,338 780,338" fill="#0a0a0a" opacity="0.12"/>
</svg>
